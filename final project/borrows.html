<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Borrow Status</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom right, #00d1b2, #8cc63f);
      color: #333;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      width: 50%;
      height: 50%;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }
    p {
      font-size: 18px;
      margin: 15px 0;
    }
    .action-button {
      background: #00d1b2;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .action-button:hover {
      background: #008d75;
    }
    .back-button {
    position: absolute;
    top: 20px;
    left: 20px;
    text-decoration: none;
    padding: 10px 20px;
    background-color: #ffffff;
    color: #1eae98;
    font-weight: bold;
    transition: background-color 0.3s ease, color 0.3s ease;
}

.back-button:hover {
    background-color: #1eae98;
    color: #ffffff;
}
  </style>
</head>
<body>
  <div class="container">
    <button class="back-button" onclick="window.location.href='profile.html'">← Back</button>
    <h1>Borrow Status</h1>
    <p>No borrowings are currently available.</p>
    <a href="borrow.html" class="action-button">Go to Borrow</a>
  </div>
</body>
</html>
