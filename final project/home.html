<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Funds</title> 
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: linear-gradient(to right, #00a1d6, #89e66c);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #000;
            text-align: center;
        }
        header {
            width: 100%;
            padding: 1rem 2rem;
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: absolute;
            top: 0;
        }
        .logo {
            display: flex;
            align-items: center;
        }

        .logo img {
            height: 50px;
            margin-right: 10px;
        }

        .logo span {
            font-size: 1.5rem;
            color: #fff;
            font-weight: bold;
        }
        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #000;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #3333ff;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
            margin-top: 80px; 
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #000;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: #333;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .subscription-btn {
            margin-top: 20px;
        }

        .subscription-btn a {
            padding: 0.75rem 2rem;
            font-size: 1rem;
            color: #fff;
            background-color: #28a745;
            text-decoration: none;
            border-radius: 8px;
            transition: background-color 0.3s, transform 0.3s;
        }

        .subscription-btn a:hover {
            background-color: #218838;
            transform: scale(1.1);
        }

        .buttons a {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            color: #fff;
            background-color: #3333ff;
            text-decoration: none;
            border-radius: 8px;
            transition: background-color 0.3s;
        }

        .buttons a:hover {
            background-color: #0000cc;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="202289173-removebg-preview.png">
            <span>Circle Funds</span>
        </div>
        <nav>
            <a href="home.html">Home</a>
            <a href="about.html">About</a>
            <a href="calculator.html">Interest Calculator</a>
            <a href="service.html">Services</a>
            <a href="profile.html">Profile</a>
            <a href="helpandsupport.html">Help & Support</a>
        </nav>
    </header>
    <div class="container">
        <h1>Welcome to Circle Funds</h1>
        <p>Connecting wealthy individuals with those in need by peer to peer lending</p>
        <p>Do you want to borrow or lend money?</p>
        <div class="buttons">
            <a href="borrow.html">Borrow</a>
            <a href="lend.html">Lend</a>
        </div>
        <div class="subscription-btn">
            <a href="subscription.html">Premium Subscription</a>
        </div>
    </div>
    

</body>
</html>
