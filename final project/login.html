<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Circle Funds</title>
  <style>
      * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          font-family: Arial, sans-serif;
      }

      body {
          height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: linear-gradient(to right, #1eae98, #a8e063);
          position: relative;
      }

      .logo {
          position: absolute;
          top: 10px;
          left: 10px;
          display: flex;
          align-items: center;
      }

      .logo img {
          height: 50px;
          margin-right: 10px;
      }

      .logo span {
          font-size: 1.5rem;
          color: #fff;
          font-weight: bold;
      }

      .container {
          width: 100%;
          max-width: 400px;
          padding: 20px;
          background: white;
          border-radius: 8px;
          box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
          text-align: center;
      }

      .form-container h2 {
          font-size: 1.8rem;
          color: #222;
          margin-bottom: 5px;
      }

      .form-container p {
          font-size: 0.9rem;
          color: #555;
          margin-bottom: 20px;
      }

      .form-container label {
          font-size: 1rem;
          color: #333;
          display: block;
          margin-top: 15px;
          text-align: left;
      }

      .form-container input {
          width: 100%;
          padding: 10px;
          font-size: 1rem;
          margin-top: 5px;
          border-radius: 5px;
          border: 1px solid #ddd;
      }

      .form-container button {
          width: 100%;
          padding: 10px;
          margin-top: 20px;
          font-size: 1rem;
          color: white;
          background-color: #3333ff;
          border: none;
          border-radius: 5px;
          cursor: pointer;
          transition: background-color 0.3s;
      }

      .form-container button:hover {
          background-color: #0000cc;
      }

      .links {
          margin-top: 15px;
          font-size: 0.9rem;
          color: #555;
      }

      .links a {
          color: #3333ff;
          text-decoration: none;
      }

      .links a:hover {
          text-decoration: underline;
      }
  </style>
</head>
<body>
  <div class="logo">
      <img src="202289173-removebg-preview.png" alt="Circle Funds Logo">
      <span>Circle Funds</span>
  </div>
  <div class="container">
    <div class="form-container">
      <h2>Sign In</h2>
      <p>Login into your account</p>
      <form action="home.html" method="GET">
        <label for="username">UserName :</label>
        <input type="text" id="username" placeholder="Enter your username" required>
        <label for="password">Password :</label>
        <input type="password" id="password" placeholder="Enter your Password" required>
        <button type="submit">Login</button>
      </form>
      <div class="links">
        <a href="#" class="forgot-password">Forgot Password?</a>
        <p>Don’t have an Account? <a href="signup.html">SignUp</a></p>
      </div>
    </div>
  </div>
</body>
</html>
