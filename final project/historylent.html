<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lending History</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #00a1d6, #89e66c);
      color: #333;
      margin: 0;
      padding: 0;
    }

    .history-container {
      max-width: 800px;
      margin: 50px auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .back-button {
      background: #00a5e0;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
      position: absolute;
      top: 20px;
      left: 20px;
    }

    .back-button:hover {
      background: #007bb8;
    }

    .history-box {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
    }

    h4 {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="history-container">
    <a href="profile.html" class="back-button">← Back</a>
    <h1>Lending History</h1>
    <div class="history-box">
      <h4>Lent $200 on 03/15/2024</h4>
      <h4>Lent $600 on 07/01/2024</h4>
      <h4>Lent $1000 on 05/22/2024</h4>
    </div>
  </div>
</body>
</html>
