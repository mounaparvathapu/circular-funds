<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Borrowing History</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #00a1d6, #89e66c);
      color: #333;
      margin: 0;
      padding: 0;
    }
    .back-button {
    position: absolute;
    top: 20px;
    left: 20px;
    text-decoration: none;
    padding: 10px 20px;
    background-color: #ffffff;
    color: #1eae98;
    border-radius: 8px;
    font-weight: bold;
    transition: background-color 0.3s ease, color 0.3s ease;
}

.back-button:hover {
    background-color: #1eae98;
    color: #ffffff;
}
    .history-container {
      width: 50%; 
      margin: 50px auto;

      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .back-button {
      background: #00a5e0;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
      position: absolute;
      top: 20px;
      left: 20px;
    }

    .back-button:hover {
      background: #007bb8;
    }

    .history-box {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
    }

      margin-bottom: 10px;
    }

    .back-button {
      position: absolute;
      top: 20px;
      left: 20px;
      text-decoration: none;
      padding: 10px 20px;
      background-color: #ffffff;
      color: #1eae98;

      color: #ffffff;
    }
  </style>
</head>

  <div class="history-container">
