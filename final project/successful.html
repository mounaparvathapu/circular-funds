<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circle Funds - Payment Successful</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: #f4f7f6;
    }

    header {
      background: linear-gradient(to right, #1eae98, #a8e063);
      padding: 20px;
      color: white;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 36px;
    }

    .success-container {
      text-align: center;
      padding: 50px;
    }

    .success-box {
      background: white;
      padding: 40px;
      width: 400px;
      margin: 0 auto;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .success-box h2 {
      color: #1eae98;
      margin-bottom: 20px;
    }

    .success-box p {
      color: #333;
      font-size: 18px;
      margin-bottom: 20px;
    }

    .back-button {
      text-decoration: none;
      padding: 10px 20px;
      background-color: #1eae98;
      color: white;
      border-radius: 5px;
      font-size: 16px;
      transition: background-color 0.3s ease;
    }

    .back-button:hover {
      background-color: #148f77;
    }

    footer {
      background: #1eae98;
      color: white;
      text-align: center;
      padding: 10px 0;
      position: absolute;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>
  <header>
    <h1>Circle Funds</h1>
  </header>

  <div class="success-container">
    <div class="success-box">
      <h2>Payment Successful!</h2>
      <p>Thank you for your payment. Your transaction has been completed successfully.</p>
      <a href="home.html" class="back-button">Back to Dashboard</a>
    </div>
  </div>

  <footer>
    &copy; 2024 Circle Funds. All rights reserved.
  </footer>
</body>
</html>
